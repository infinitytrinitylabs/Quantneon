services:
  db:
    image: postgres:15-alpine
    container_name: quantneon-db
    environment:
      POSTGRES_USER: quantneon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quantneon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantneon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quantneon-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantneon-backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://quantneon:password@db:5432/quantneon?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - QUANTMAIL_JWT_SECRET=${QUANTMAIL_JWT_SECRET:-change_this_in_production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # Pre-start command to ensure the DB is seeded in production
    command: >
      sh -c "npx prisma migrate deploy &&
             npm start"

  # NOTE: Frontend service commented out - needs Dockerfile in quantneon-frontend
  # Uncomment and update when frontend Dockerfile is ready
  # frontend:
  #   build:
  #     context: ../../quantneon-frontend
  #     dockerfile: Dockerfile
  #   container_name: quantneon-frontend
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - backend

volumes:
  pgdata:
  redisdata:
